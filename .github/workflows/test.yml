# Run the virtual_pins regression tests against the latest Klipper code
name: Test

on:
  push:
  pull_request:
  schedule:
    # Daily at 04:00 UTC, to catch breakage from Klipper master drift even when idle
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout virtual_pins
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev gcc-avr avr-libc

      - name: Clone Klipper master
        run: git clone --depth 1 https://github.com/Klipper3d/klipper.git ../klipper

      - name: Install Klipper Python requirements
        run: |
          pip install -r ../klipper/scripts/klippy-requirements.txt
          pip install -r ../klipper/scripts/tests-requirements.txt

      - name: Run tests
        run: bash test/run-tests.sh
