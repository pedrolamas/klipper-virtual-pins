# Test config for virtual digital_in pins used by buttons
[mcu]
serial: /dev/ttyACM0

[printer]
kinematics: none
max_velocity: 300
max_accel: 3000

[respond]

[virtual_pins]

# Normal button on a virtual pin
[gcode_button btn]
pin: virtual_pin:btn
press_gcode:
    RESPOND MSG="btn pressed"
release_gcode:
    RESPOND MSG="btn released"

# Inverted button on a virtual pin
[gcode_button btn2]
pin: !virtual_pin:btn2
press_gcode:
    RESPOND MSG="btn2 pressed"
release_gcode:
    RESPOND MSG="btn2 released"
