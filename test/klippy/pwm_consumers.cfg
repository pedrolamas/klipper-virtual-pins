# Test config for MCU-compat consumers that call MCU-only methods directly on
# the virtual_pin chip (max_nominal_duration / get_constant_float).
[mcu]
serial: /dev/ttyACM0

[printer]
kinematics: none
max_velocity: 300
max_accel: 3000

[virtual_pins]

# Soft PWM with variable cycle time. PrinterOutputPWMCycle.__init__ calls
# chip.max_nominal_duration() at config load (pwm_cycle_time.py).
[pwm_cycle_time pc]
pin: virtual_pin:pc
cycle_time: 0.1

# Hardware PWM tool. Exercises chip.max_nominal_duration() and, during
# build_config, chip.get_constant_float("PWM_MAX") (pwm_tool.py).
[pwm_tool pt]
pin: virtual_pin:pt
hardware_pwm: True
cycle_time: 0.1
