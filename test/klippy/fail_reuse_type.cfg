# Reusing the same virtual pin name in two config sections must fail.
# (Klipper's core pins layer rejects the duplicate -- "pin used multiple
# times in config" -- before virtual_pins' own per-type guard is reached.)
[mcu]
serial: /dev/ttyACM0

[printer]
kinematics: none
max_velocity: 300
max_accel: 3000

[virtual_pins]

[output_pin x]
pin: virtual_pin:x

[manual_stepper s]
step_pin: PF6
dir_pin: PF7
enable_pin: !PF2
microsteps: 16
rotation_distance: 40
endstop_pin: virtual_pin:x
