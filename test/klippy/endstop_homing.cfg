# Test config for a virtual endstop pin used by a homing move.
# step/dir/enable must be real MCU pins; only the endstop is virtual.
[mcu]
serial: /dev/ttyACM0

[printer]
kinematics: none
max_velocity: 300
max_accel: 3000

[virtual_pins]

[manual_stepper homing_stepper]
step_pin: PF6
dir_pin: !PF7
enable_pin: !PF2
microsteps: 16
rotation_distance: 40
endstop_pin: virtual_pin:es
