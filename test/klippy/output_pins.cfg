# Test config for virtual output / pwm / adc / digital_in pins
[mcu]
serial: /dev/ttyACM0

[printer]
kinematics: none
max_velocity: 300
max_accel: 3000

[virtual_pins]
start_values:
    a = 1,
    t1 = 0.5

# Digital output pin
[output_pin a]
pin: virtual_pin:a

# PWM output pin
[output_pin b]
pin: virtual_pin:b
pwm: True
cycle_time: 0.1

# Inverted digital output pin
[output_pin c]
pin: !virtual_pin:c

# Inverted PWM output pin (exercises the PwmVirtualPin invert branch)
[output_pin d]
pin: !virtual_pin:d
pwm: True
cycle_time: 0.1

# ADC consumer driven by a virtual adc pin
[temperature_sensor t1]
sensor_type: Generic 3950
sensor_pin: virtual_pin:t1

# Template used by the SET_VIRTUAL_PIN TEMPLATE path
[display_template tpl]
text: 0.25

# Parameterised template (exercises the TEMPLATE PARAM_ literal-eval path)
[display_template tpl_param]
param_level: 0.25
text: { param_level }
