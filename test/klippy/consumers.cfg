# Test config driving virtual pins through real Klipper consumer modules
[mcu]
serial: /dev/ttyACM0

[printer]
kinematics: none
max_velocity: 300
max_accel: 3000

[virtual_pins]

# PWM pin driven by the fan module
[fan]
pin: virtual_pin:fanpin

# digital_in pin driven by the filament switch sensor (buttons) path
[filament_switch_sensor fs]
switch_pin: virtual_pin:fspin
pause_on_runout: False
